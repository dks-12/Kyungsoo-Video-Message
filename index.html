<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DOH KYUNGSOO</title>

<style>
body{
    font-family: Arial Black, sans-serif;
    margin:0;
    background:#f5f5f5;
    text-align:center;
}

video{
    width:100%;
    max-height:400px;
    object-fit:cover;
}

/* ALBUM GRID STYLE */
.grid img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    justify-items: center;
}

.container{
    padding:20px;
}

.button{
    display:block;
    margin:10px auto;
    width:250px;
    padding:15px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.dropdown{
    position: relative;
    display: inline-block;
}

.dropdown-content{
    display: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    min-width: 250px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 1;
}

.dropdown-content a{
    display: block;
    padding: 12px;
    color: black;
    text-decoration: none;
}

.dropdown-content a:hover{
    background: #f0f0f0;
}

.dropdown:hover .dropdown-content{
    display: block;
}

button.button{
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
}
</style>
</head>

<body>

<video autoplay muted playsinline controls>
    <source src="kyungsoo.mp4" type="video/mp4">
</video>


<div class="container">
    <h1>DOH KYUNGSOO</h1>

    <div class="dropdown">
        <button class="button" onclick="toggleDropdown(event)">
            Socials ▼
        </button>

        <div class="dropdown-content" id="socialDropdown">
            <a href="https://x.com/dohkyungsoo_x">X / Twitter</a>
            <a href="https://instagram.com/d.o.hkyungsoo">Instagram</a>
        </div>

    <a class="button" href="https://stationhead.com/stationdoh">
        Stationhead
    </a>
    
    <a class="button" href="https://open.spotify.com/playlist/37i9dQZF1DZ06evO1vw2Ws?si=67e14231ea844b39">
        This is D.O. Playlist
    </a>

</div>

<!-- Album Art Grid -->
<div class="grid">

    <a href="https://open.spotify.com/album/4dqWy2Soq1Z1rqgKfXOATk?si=zpAi4O1uQtyILStAy5BGaw">
        <img src="empathy.jpg" alt="EMPATHY">
    </a>
    
    <a href="https://open.spotify.com/album/5toDKS5XF6fxrI4OgQjHYZ?si=XSIhp9JHQ--Gf5ymDmCVjQ">
        <img src="expectation.jpg" alt="EXPECTATION">
    </a>  

    <a href="https://open.spotify.com/album/6ZlXpA35FslDym9FIKaygk?si=YiQcq2ukT2OEch8ij3MB8A">
        <img src="blossom.jpg" alt="BLOSSOM">
    </a>
    
    <a href="https://open.spotify.com/album/6Ez3OGFT3yV9zRkKEs2S6d?si=fc1d3e6eefe64ec4">
        <img src="bliss.jpg" alt="BLISS">
    </a>

</div>

</body>
</html>
